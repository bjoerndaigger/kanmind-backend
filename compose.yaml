services:
  django-app:
    # Build image from local Dockerfile
    build: .
    # Automatically restart container on failure or system reboot
    restart: unless-stopped
    # Map host port 8000 to container port 8000
    ports:
      - 8000:8000
    # Load sensitive variables from .env file
    env_file:
      - .env
    # Non-sensitive environment variables
    environment:
      - APPLICATION_PORT=8000
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Wait until the database is ready
    depends_on:
      db:
        condition: service_healthy
    # Mirrors local code into container for live reload
    # Remove in production
    volumes:
      - .:/app/

  # DB configuration
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    # Health check to prevent Django from starting too early
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      retries: 5

# Named volume managed by Docker
volumes:
  postgres_data:
